# ──────────────────────────────────────────────────────────────
#  Netlify-configuratie voor de statische Astro-build.
#  Geen adapter nodig — dit is een volledig statische site.
# ──────────────────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Veiligheids- en performance-headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Langlevende cache voor gehashte assets (fonts, afbeeldingen, JS/CSS).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
