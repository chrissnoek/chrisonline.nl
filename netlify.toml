# ──────────────────────────────────────────────────────────────
#  Netlify-configuratie voor de Astro-build.
#  Output is statisch (alle pagina's geprerenderd), maar de
#  @astrojs/netlify-adapter draait de enkele on-demand route(s)
#  — de AI-chat-endpoint — als Netlify Function. De adapter beheert
#  zelf de publish-map en de functions; daarom géén hardcoded
#  `publish` hier (dat zou de SSR-routes breken).
# ──────────────────────────────────────────────────────────────

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

  # info@chrisonline.nl is het publieke contactadres en staat bewust in de build
  # (src/config/site.ts, package.json). Mocht dit adres ook als env-var
  # (QUOTE_TO_EMAIL/QUOTE_FROM_EMAIL) in het Netlify-dashboard staan, dan zou de
  # secrets-scanner het als "lek" zien — daarom blijven die twee sleutels
  # uitgezonderd. Het zijn geen geheimen. De echte secrets (GROQ/UPSTASH) blijven
  # gewoon gescand. (Offerte-mail loopt nu via Netlify Forms, niet meer via Resend.)
  SECRETS_SCAN_OMIT_KEYS = "QUOTE_TO_EMAIL,QUOTE_FROM_EMAIL"

# Veiligheids- en performance-headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Langlevende cache voor gehashte assets (fonts, afbeeldingen, JS/CSS).
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
